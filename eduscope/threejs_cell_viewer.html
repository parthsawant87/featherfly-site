<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>EduScope 3D Cell Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#e8e4dc}

/* TABS — fixed top */
#tabs{position:fixed;top:0;left:0;right:0;height:38px;z-index:10;display:flex;background:#080b10;border-bottom:1px solid #1a1f2e;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 10px;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;flex-shrink:0;min-width:60px;user-select:none;height:100%}
.tab:hover{background:rgba(255,255,255,.05)}
.tab.act{border-bottom-color:#14b8a6;background:rgba(20,184,166,.07)}
.tab-icon{font-size:14px;line-height:1}
.tab-name{font-size:7.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.32);transition:color .18s}
.tab.act .tab-name{color:#14b8a6}

/* BOTTOM BAR — fixed bottom */
#bot{position:fixed;bottom:0;left:0;right:0;height:28px;z-index:10;background:#080b10;border-top:1px solid #1a1f2e;display:flex;align-items:center;padding:0 12px;gap:12px}
.dot{width:5px;height:5px;border-radius:50%;background:#2a2a3a;transition:background .4s;flex-shrink:0}
.dot.live{background:#22c55e;animation:bl 2s infinite}
.dot.err{background:#e03c2c}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
#bot-txt{font-size:8.5px;color:rgba(255,255,255,.22);letter-spacing:.04em}
#bot-conf{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);margin-left:auto}
#bot-drag{font-size:8px;color:rgba(255,255,255,.15)}

/* CANVAS — absolutely fills middle area */
#canvas-wrap{
  position:fixed;
  top:38px;
  left:0;
  right:265px;
  bottom:28px;
  background:#0d1117;
}
#cv{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  display:block;
}
#lbl-svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  overflow:visible;
}
.lbl-txt{pointer-events:all;cursor:pointer;font-weight:700}

/* PANEL — fixed right */
#panel{
  position:fixed;
  top:38px;
  right:0;
  width:265px;
  bottom:28px;
  background:#080b10;
  border-left:1px solid #1a1f2e;
  overflow-y:auto;
  padding:14px;
  scrollbar-width:thin;
  scrollbar-color:#1a1f2e transparent;
}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:#1a1f2e}

/* Panel content styles */
.p-name{font-size:14px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:2px}
.p-lat{font-size:9.5px;color:rgba(255,255,255,.3);font-style:italic;margin-bottom:2px}
.p-ch{font-size:9.5px;color:#14b8a6;margin-bottom:8px}
.p-stain{font-size:8.5px;color:rgba(255,255,255,.22);margin-bottom:10px;padding:4px 7px;background:rgba(255,255,255,.03);border-radius:4px;border-left:2px solid rgba(255,255,255,.1);line-height:1.5}
.divider{height:1px;background:#1a1f2e;margin:10px 0}
.sec-lbl{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:6px}
.ov-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ov-item:last-child{border-bottom:none}
.ov-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ov-body{font-size:10.5px;line-height:1.5;color:rgba(255,255,255,.55)}
.ov-body strong{color:rgba(255,255,255,.82);display:block;font-size:11px}
.back-btn{font-size:9.5px;color:rgba(255,255,255,.28);cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:rgba(255,255,255,.55)}
.s-name{font-size:15px;font-weight:700;margin-bottom:6px}
.s-fn{font-size:11.5px;color:rgba(255,255,255,.62);line-height:1.65;margin-bottom:8px}
.s-ncert{display:inline-block;font-size:8.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(20,184,166,.12);color:#14b8a6;margin-bottom:9px}
.s-fact{font-size:10.5px;color:rgba(255,255,255,.42);line-height:1.65;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid #14b8a6}
.s-fact::before{content:"💡 "}
.anim-note{margin-top:10px;font-size:9.5px;color:#f0a020;padding:5px 8px;background:rgba(240,160,32,.06);border-radius:5px;border-left:2px solid #f0a020;line-height:1.5}
.xs-btn{font-size:8.5px;font-weight:700;padding:3px 9px;border-radius:4px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.45);cursor:pointer;flex-shrink:0;letter-spacing:.04em;}
.xs-btn.act{background:rgba(20,184,166,.15);border-color:rgba(20,184,166,.5);color:#14b8a6;}
.xs-note{margin-top:8px;font-size:9px;color:#14b8a6;padding:4px 8px;background:rgba(20,184,166,.06);border-radius:4px;border-left:2px solid #14b8a6;line-height:1.5}
</style>
</head>
<body>

<!-- TABS -->
<div id="tabs">
  <div class="tab act" data-spec="ONION_CELL"   onclick="tabClick(this)"><span class="tab-icon">🧅</span><span class="tab-name">Onion</span></div>
  <div class="tab"     data-spec="CHEEK_CELL"   onclick="tabClick(this)"><span class="tab-icon">🫦</span><span class="tab-name">Cheek</span></div>
  <div class="tab"     data-spec="BLOOD_SMEAR"  onclick="tabClick(this)"><span class="tab-icon">🩸</span><span class="tab-name">Blood</span></div>
  <div class="tab"     data-spec="STOMATA"      onclick="tabClick(this)"><span class="tab-icon">🍃</span><span class="tab-name">Stomata</span></div>
  <div class="tab"     data-spec="AMOEBA"       onclick="tabClick(this)"><span class="tab-icon">🦠</span><span class="tab-name">Amoeba</span></div>
  <div class="tab"     data-spec="YEAST"        onclick="tabClick(this)"><span class="tab-icon">🍺</span><span class="tab-name">Yeast</span></div>
  <div class="tab"     data-spec="BACTERIA"     onclick="tabClick(this)"><span class="tab-icon">🔬</span><span class="tab-name">Bacteria</span></div>
  <div class="tab"     data-spec="POLLEN"       onclick="tabClick(this)"><span class="tab-icon">🌸</span><span class="tab-name">Pollen</span></div>
  <div class="tab"     data-spec="FUNGI_HYPHAE" onclick="tabClick(this)"><span class="tab-icon">🍄</span><span class="tab-name">Fungi</span></div>
</div>

<!-- CANVAS AREA -->
<div id="canvas-wrap">
  <canvas id="cv"></canvas>
  <svg id="lbl-svg"></svg>
</div>

<!-- RIGHT PANEL -->
<div id="panel"><div id="pc"></div></div>

<!-- BOTTOM BAR -->
<div id="bot">
  <div class="dot" id="dot"></div>
  <span id="bot-txt">waiting for pod</span>
  <span id="bot-conf"></span>
  <span id="bot-drag">drag · tap structure to learn</span>
  <span class="xs-btn" id="xs-btn" onclick="toggleXS()">✂ Cross-section</span>
</div>
<canvas id="sc-cv" style="position:fixed;bottom:28px;left:0;pointer-events:none;z-index:5;"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" onerror="document.body.innerHTML='<div style=color:#fff;padding:20px;font-family:monospace>THREE.js failed to load. Check internet connection.</div>'"></script>
<script>

// Structure lessons
const LESSONS = {
  // ONION ROOT TIP
  onion_wall:{name:'Cell Wall',col:'#d4895a',fn:'Made of cellulose — gives the rectangular brick-like shape. Under acetocarmine stain it appears as a pale line between cells.',ncert:'Class 9, Ch.5',fact:'The cell wall is NOT living — it is secreted by the cell membrane. It provides shape and protection.'},
  onion_nuc: {name:'Nucleus',col:'#8b2500',fn:'Dark red oval — acetocarmine binds strongly to DNA. The large nucleus means the cell is metabolically very active.',ncert:'Class 9, Ch.5',fact:'Root tip cells divide rapidly to push the root through soil. This is why root tip is used to study mitosis!'},
  onion_chrom:{name:'Chromosomes (mitosis)',col:'#c0180f',fn:'Visible only during cell division. Acetocarmine stains condensed chromosomes deep red. You can identify the stage of mitosis by chromosome arrangement.',ncert:'Class 9, Ch.10 — Cell Cycle',fact:'Onion (Allium cepa) has only 16 chromosomes — easy to count and study under a school microscope!'},
  onion_cyt: {name:'Cytoplasm',col:'#e8b090',fn:'Pale orange background. Takes up less acetocarmine than the nucleus. Contains all organelles but none are visible at school magnification.',ncert:'Class 9, Ch.5',fact:'The cytoplasm is 70% water. All biochemical reactions of the cell happen here.'},
  // CHEEK
  cheek_mem: {name:'Cell Membrane',col:'#b8d4ee',fn:'No rigid wall — animal cells rely on this flexible phospholipid bilayer. Gives the irregular polygon shape.',ncert:'Class 9, Ch.5',fact:'You shed and replace your entire mouth lining every 3–5 days. Today\'s cheek cells are already on their way out!'},
  cheek_nuc: {name:'Nucleus',col:'#1a3aaa',fn:'Dark blue, oval, centrally located. Methylene blue stains the acidic DNA intensely.',ncert:'Class 9, Ch.5',fact:'A single nucleus contains ~2 metres of DNA coiled so tightly it fits in a 6-micrometre space.'},
  cheek_cyt: {name:'Cytoplasm',col:'#c8dff0',fn:'Very pale blue granular material. Much lighter than the nucleus because it has less DNA to stain.',ncert:'Class 9, Ch.5',fact:'The cytoplasm contains thousands of ribosomes — each one a tiny protein-making machine.'},
  // BLOOD
  blood_rbc: {name:'RBC — Erythrocyte',col:'#f0c0b8',fn:'Pale pink biconcave disc. The pale centre is KEY — it proves the biconcave shape. NO nucleus — removed to maximise haemoglobin space.',ncert:'Class 11, Ch.18',fact:'Each RBC carries ~270 million haemoglobin molecules. It lives ~120 days then gets recycled by the spleen.'},
  blood_wbc: {name:'WBC — Neutrophil',col:'#7733bb',fn:'Multi-lobed dark purple nucleus surrounded by pale cytoplasm. Most common WBC. First responder to bacterial infection.',ncert:'Class 11, Ch.18',fact:'Neutrophils live only 5–7 days — they sacrifice themselves fighting bacteria and become pus!'},
  blood_cyt: {name:'WBC Cytoplasm',col:'#e8d0e0',fn:'Pale halo around the nucleus. The boundary between WBC cytoplasm and surrounding plasma is the cell membrane.',ncert:'Class 11, Ch.18',fact:'Remember WBC types: Never Eat Bad Mouldy Lettuce = Neutrophil, Eosinophil, Basophil, Monocyte, Lymphocyte'},
  blood_plt: {name:'Platelet — Thrombocyte',col:'#f8d0d0',fn:'Not a full cell — a tiny cytoplasmic fragment from megakaryocytes. Clumps at wounds to form clots.',ncert:'Class 11, Ch.18',fact:'Normal platelet count: 1.5–4 lakh per µL. Low platelets = key dengue warning sign.'},
  // STOMATA
  stom_guard:{name:'Guard Cells',col:'#5a8a2a',fn:'Kidney-shaped pair. Open when turgid (K⁺ ions pump in, water follows). Close when flaccid. The ONLY epidermal cells with chloroplasts.',ncert:'Class 11, Ch.11',fact:'Guard cells are the only epidermal cells with chloroplasts — they need ATP to pump K⁺ ions and open the pore.'},
  stom_pore: {name:'Stoma (pore)',col:'#2a5a10',fn:'The dark oval slit between guard cells. Opens in light (CO₂ in, O₂ out, water vapour out). Closes in dark or drought.',ncert:'Class 11, Ch.11',fact:'A single corn leaf has ~156 million stomata. Each opens and closes independently.'},
  stom_epi:  {name:'Epidermal Cell',col:'#78b040',fn:'Larger surrounding cells with NO chloroplasts. Transparent — allows light to pass through to mesophyll below.',ncert:'Class 11, Ch.11',fact:'Epidermal cells secrete cuticle (waxy layer) to prevent water loss. Desert plants have very thick cuticle.'},
  // AMOEBA
  amoe_body: {name:'Cell Body',col:'#c8d8d8',fn:'Transparent irregular shape. Cytoplasm has two regions: outer ectoplasm (clear, firm) and inner endoplasm (granular, fluid). Streams continuously.',ncert:'Class 8, Ch.2',fact:'Amoeba changes shape every few seconds — it has no fixed form at all.'},
  amoe_pseudo:{name:'Pseudopodium',col:'#aacccc',fn:'Greek: pseudo = false, podium = foot. Cytoplasm streams into an extension. Used for BOTH movement and catching food (phagocytosis).',ncert:'Class 8, Ch.2',fact:'When Amoeba catches food, it wraps pseudopodia around prey and forms a food vacuole — digestion inside!'},
  amoe_nuc:  {name:'Nucleus',col:'#2255aa',fn:'Controls all cell activities. Slightly denser region — barely visible without staining. Amoeba reproduces by binary fission — nucleus divides first.',ncert:'Class 8, Ch.2',fact:'Amoeba dubia has the largest genome of any organism — 670 billion base pairs vs human\'s 3 billion!'},
  amoe_food: {name:'Food Vacuole',col:'#22aa44',fn:'Green — contains captured algae or bacteria being digested. Enzymes are secreted into it. Gets smaller as food is digested.',ncert:'Class 8, Ch.2',fact:'The green colour comes from captured algae — Amoeba is in the middle of digesting its lunch!'},
  amoe_cv:   {name:'Contractile Vacuole',col:'#ddeeff',fn:'Constantly inflates with water and deflates (contracts) — pumps excess water out. Freshwater Amoeba gains water by osmosis constantly.',ncert:'Class 8, Ch.2',fact:'You can watch the contractile vacuole pulse under a microscope — it inflates and deflates every 5–10 seconds.'},

  yeast_bud: {name:'Bud (daughter cell)',col:'#b8d0e8',fn:'Grows as outgrowth from mother. Receives copy of nucleus. When large enough, separates. This is asexual reproduction by budding.',ncert:'Class 11, Ch.2',fact:'Under ideal conditions yeast doubles every 90 minutes — one cell becomes 1 million in just 30 hours!'},
  // BACTERIA
  bact_rod:  {name:'Bacillus (rod)',col:'#3377cc',fn:'Rod-shaped bacterium. NO membrane-bound nucleus (prokaryote). 1–5 µm — 10 times smaller than an animal cell.',ncert:'Class 8, Ch.2; Class 11, Ch.2',fact:'One bacterium can become 2 billion in just 8 hours under ideal conditions — exponential growth.'},
  bact_pair: {name:'Dividing pair',col:'#4488dd',fn:'Binary fission: cell elongates, DNA replicates, cell wall pinches in the middle, two identical daughters form. Fastest reproduction in nature.',ncert:'Class 8, Ch.2',fact:'Binary fission produces genetically identical daughters — bacteria only evolve through mutations!'},
  // POLLEN
  poll_ex:   {name:'Exine',col:'#ffcc22',fn:'Outer wall made of sporopollenin. Most resistant biological substance — not degraded by any known enzyme or acid.',ncert:'Class 12, Ch.2',fact:'Pollen exines are found intact in 10,000-year-old ice cores. Scientists identify Ice Age plants from fossil pollen!'},
  poll_sp:   {name:'Spine',col:'#ee9900',fn:'Each species has unique spine pattern — like a fingerprint. Palynologists identify plants by their pollen.',ncert:'Class 12, Ch.2',fact:'Forensic scientists can track where a person has been from pollen on their clothes — each region has unique pollen.'},
  poll_pore: {name:'Germination pore',col:'#cc7700',fn:'Pollen tube grows from here after landing on stigma. Travels down the style to reach the ovule — can grow several cm.',ncert:'Class 12, Ch.2',fact:'Pollen tubes race to reach the ovule first — it is a competition between pollen grains!'},
  // FUNGI
  fung_hyp:  {name:'Hypha (filament)',col:'#77bbaa',fn:'Thread-like tube forming the fungal body (mycelium). No cross-walls in Rhizopus (coenocytic = many nuclei in one tube).',ncert:'Class 10, Ch.8',fact:'The largest organism on Earth is a honey fungus mycelium in Oregon — 8.9 km² and over 8,000 years old!'},
  fung_spor: {name:'Sporangium',col:'#111111',fn:'Black round spore case at tip of the sporangiophore stalk. When mature it bursts and releases thousands of spores into air.',ncert:'Class 10, Ch.8',fact:'One Rhizopus sporangium contains up to 50,000 spores — which is why bread mold spreads so fast!'},
  fung_rhiz: {name:'Rhizoid',col:'#55aa88',fn:'Root-like anchors. Attach fungus to the bread/substrate. Secrete digestive enzymes outside the body — external digestion.',ncert:'Class 10, Ch.8',fact:'Rhizopus digests food OUTSIDE its body — it pours enzymes onto bread then absorbs the digested nutrients.'},
};

// ══════════════════════════════════════════════════════════════════════
// THREE.JS SETUP
// ══════════════════════════════════════════════════════════════════════
const cvEl = document.getElementById('cv');
const wrap = document.getElementById('canvas-wrap');
// Use window dimensions directly - position:fixed not yet painted
const _IW = window.innerWidth, _IH = window.innerHeight;
const _CW = _IW - 265, _CH = _IH - 66;
const renderer = new THREE.WebGLRenderer({canvas:cvEl,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(_CW, _CH, false);
renderer.setClearColor(0x0d1117,1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, _CW/_CH, 0.1, 100);
camera.position.set(0,0,6);

const amb = new THREE.AmbientLight(0x556677,1.4); scene.add(amb);
const sun = new THREE.DirectionalLight(0xffffff,1.4); sun.position.set(5,6,5); scene.add(sun);
const fill = new THREE.DirectionalLight(0x334488,0.5); fill.position.set(-4,-3,3); scene.add(fill);
const topLight = new THREE.DirectionalLight(0xffffff,0.3); topLight.position.set(0,8,0); scene.add(topLight);

function resize(){
  const W = window.innerWidth - 265;
  const H = window.innerHeight - 66;
  if(W<10||H<10) return;
  renderer.setSize(W,H,false);
  camera.aspect=W/H;
  camera.updateProjectionMatrix();
}

function M(geo,hex,op=1,sh=40,sid=''){
  const mat=new THREE.MeshPhongMaterial({
    color:hex,transparent:true,opacity:op,shininess:sh,
    side:THREE.FrontSide,depthWrite:op>0.9
  });
  const m=new THREE.Mesh(geo,mat);
  if(sid){m.userData.sid=sid;}
  m.userData.baseOp=op;
  return m;
}
function add(parent,...meshes){meshes.forEach(m=>parent.add(m));return parent;}

// SVG labels
const svg=document.getElementById('lbl-svg');
const NS='http://www.w3.org/2000/svg';
let lblDefs=[];

function clearLabels(){while(svg.firstChild)svg.removeChild(svg.firstChild);lblDefs=[];}

function addLbl(offset3d,text,col,sid){
  lblDefs.push({offset:new THREE.Vector3(...offset3d),text,col,sid});
}

function renderLabels(){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  if(!curGroup)return;
  const W=wrap.clientWidth,H=wrap.clientHeight;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const CX=W/2,CY=H/2;

  lblDefs.forEach(def=>{
    const wp=def.offset.clone();
    curGroup.localToWorld(wp);
    const p=wp.clone().project(camera);
    if(p.z>1)return;
    const sx=(p.x*.5+.5)*W, sy=(-p.y*.5+.5)*H;
    const dx=sx-CX,dy=sy-CY,len=Math.sqrt(dx*dx+dy*dy)||1;
    const lx=sx+(dx/len)*52, ly=sy+(dy/len)*34;

    // Dot
    const d=document.createElementNS(NS,'circle');
    d.setAttribute('cx',sx);d.setAttribute('cy',sy);
    d.setAttribute('r',3.5);d.setAttribute('fill',def.col);
    d.setAttribute('stroke','#0d1117');d.setAttribute('stroke-width',1.5);
    svg.appendChild(d);

    // Line
    const l=document.createElementNS(NS,'line');
    l.setAttribute('x1',sx);l.setAttribute('y1',sy);
    l.setAttribute('x2',lx);l.setAttribute('y2',ly);
    l.setAttribute('stroke',def.col);l.setAttribute('stroke-width',0.9);
    l.setAttribute('opacity',0.65);
    svg.appendChild(l);

    // Text
    const t=document.createElementNS(NS,'text');
    t.setAttribute('x',lx+(lx>CX?4:-4));
    t.setAttribute('y',ly+1);
    t.setAttribute('text-anchor',lx>CX?'start':'end');
    t.setAttribute('font-size',10);
    t.setAttribute('font-family','-apple-system,system-ui,sans-serif');
    t.setAttribute('font-weight','700');
    t.setAttribute('fill',def.col);
    t.setAttribute('dominant-baseline','middle');
    t.setAttribute('class','lbl-txt');
    t.textContent=def.text;
    t.addEventListener('click',()=>openLesson(def.sid));
    svg.appendChild(t);
  });
}

function buildOnionCell(){
  // ONION ROOT TIP — acetocarmine stain — orange-brown cells, dark red nuclei
  // Shows 6 cells including some in mitosis stages
  const g=new THREE.Group();
  const BG=0xd4895a; // warm orange-brown cell body
  const NUC=0x8b2500; // dark red nucleus
  const CHROM=0xc0180f; // bright red chromosomes
  const WALL=0xc07840; // slightly darker wall edges

  // Cell positions: 2 columns x 3 rows
  const cells=[
    {x:-0.6,y:-0.75,stage:'interphase'},
    {x: 0.6,y:-0.75,stage:'interphase'},
    {x:-0.6,y: 0,   stage:'prophase'},
    {x: 0.6,y: 0,   stage:'metaphase'},
    {x:-0.6,y: 0.75,stage:'interphase'},
    {x: 0.6,y: 0.75,stage:'anaphase'},
  ];

  cells.forEach(({x,y,stage})=>{
    // Cell body
    const cell=M(new THREE.BoxGeometry(1.1,0.68,0.22),BG,0.85,20,'onion_wall');
    cell.position.set(x,y,0);
    g.add(cell);
    // Wall edge lines
    const edge=new THREE.EdgesGeometry(new THREE.BoxGeometry(1.12,0.70,0.24));
    const el=new THREE.LineSegments(edge,new THREE.LineBasicMaterial({color:WALL,opacity:0.7,transparent:true}));
    el.position.set(x,y,0); g.add(el);

    if(stage==='interphase'){
      // Large oval nucleus
      const nuc=M(new THREE.SphereGeometry(0.18,12,10),NUC,0.92,30,'onion_nuc');
      nuc.scale.set(1.2,1,0.7); nuc.position.set(x+0.05,y+0.03,0.08); g.add(nuc);
      // Nucleolus
      const nlo=M(new THREE.SphereGeometry(0.06,8,6),0x6a1800,0.9);
      nlo.position.set(x+0.08,y+0.06,0.12); g.add(nlo);
    } else if(stage==='prophase'){
      // Condensing chromosomes — tangled mass
      for(let i=0;i<5;i++){
        const cx2=M(new THREE.TorusGeometry(0.07,0.018,6,10),CHROM,0.88,20,'onion_chrom');
        cx2.position.set(x+(i*.04-.08),y+(i*.03-.06),0.08);
        cx2.rotation.z=i*0.6; g.add(cx2);
      }
    } else if(stage==='metaphase'){
      // Chromosomes aligned at cell plate — visible as line
      for(let i=0;i<4;i++){
        const chm=M(new THREE.BoxGeometry(0.04,0.15,0.04),CHROM,0.9,20,'onion_chrom');
        chm.position.set(x+(i*.1-.15),y,0.1); g.add(chm);
      }
    } else if(stage==='anaphase'){
      // Chromosomes pulling to poles
      for(let i=0;i<3;i++){
        const ca1=M(new THREE.BoxGeometry(0.04,0.12,0.04),CHROM,0.88,20,'onion_chrom');
        ca1.position.set(x+(i*.08-.08),y+0.22,0.08); g.add(ca1);
        const ca2=M(new THREE.BoxGeometry(0.04,0.12,0.04),CHROM,0.88,20,'onion_chrom');
        ca2.position.set(x+(i*.08-.08),y-0.22,0.08); g.add(ca2);
      }
    }
    // Cytoplasm fill
    const cyt=M(new THREE.BoxGeometry(1.08,0.66,0.18),0xe8b090,0.2,'','onion_cyt');
    cyt.position.set(x,y,0); g.add(cyt);
  });

  addLbl([0.6,0.75,0.3],'Cell Wall','#d4895a','onion_wall');
  addLbl([-1.1,0,0],'Nucleus','#8b2500','onion_nuc');
  addLbl([0.6,0,0.3],'Chromosomes\n(mitosis)','#c0180f','onion_chrom');
  addLbl([-1.2,-0.75,0],'Cytoplasm','#e8b090','onion_cyt');
  return g;
}

function buildBloodSmear(){
  // Match images 5 & 6 — pale pink RBCs with pale centre, purple lobed WBC
  const g=new THREE.Group();

  function makeRBC(){
    const geo=new THREE.SphereGeometry(0.5,16,12);
    const pos=geo.attributes.position;
    for(let i=0;i<pos.count;i++){
      const x=pos.getX(i),z=pos.getZ(i);
      const r=Math.sqrt(x*x+z*z);
      const y=pos.getY(i);
      // Flatten and create biconcave depression
      const ny = y*0.18 - (r < 0.28 ? Math.sign(y)*0.08 : 0);
      pos.setY(i,ny);
    }
    pos.needsUpdate=true; geo.computeVertexNormals(); return geo;
  }

  // 6 RBCs — pale pink with lighter centre (biconcave = pale centre visible)
  const rbcPos=[[0,0,0],[1.18,0.22,0.03],[-1.0,-0.28,0.02],[0.28,0.98,-0.02],[-0.42,0.82,0.03],[1.1,-0.85,0.02]];
  rbcPos.forEach(([x,y,z])=>{
    const rbc=M(makeRBC(),0xf0c0b8,0.92,60,'blood_rbc');
    rbc.position.set(x,y,z); rbc.rotation.z=(Math.random()-.5)*.7;
    rbc.userData.rbc=true; g.add(rbc);
    // Pale centre circle — simulates biconcave light patch
    const pale=M(new THREE.SphereGeometry(0.22,10,8),0xf8e0dc,0.5,20);
    pale.scale.set(1,0.3,1); pale.position.set(x,y,z+0.01); g.add(pale);
  });

  // WBC — larger, pale cytoplasm with multi-lobed purple nucleus (neutrophil)
  const wbcCyt=M(new THREE.SphereGeometry(0.66,14,12),0xe8d0e0,0.82,20,'blood_cyt');
  wbcCyt.position.set(-0.14,0.1,0.12); g.add(wbcCyt);
  // Multi-lobed nucleus — 3 connected spheres (neutrophil)
  const lobeDefs=[[-0.24,0.06,0.13],[0.0,0.18,0.13],[0.18,0.02,0.13]];
  lobeDefs.forEach(([lx,ly,lz])=>{
    const lobe=M(new THREE.SphereGeometry(0.19,10,8),0x7733bb,0.92,40,'blood_wbc');
    lobe.position.set(lx,ly,lz); g.add(lobe);
  });

  // Platelets — tiny pink fragments
  [[0.78,-0.72,0.06],[1.48,-0.36,0.05],[-1.18,0.52,0.04]].forEach(([x,y,z])=>{
    const plt=M(new THREE.SphereGeometry(0.1,7,5),0xf8d0d0,0.82,'','blood_plt');
    plt.scale.set(1.5,0.7,0.5); plt.position.set(x,y,z); g.add(plt);
  });

  addLbl([1.5,-0.9,0.1],'RBC (pale centre\n= biconcave)','#f0c0b8','blood_rbc');
  addLbl([-1.4,0.7,0.2],'WBC nucleus\n(multi-lobed)','#9955cc','blood_wbc');
  addLbl([-0.6,-0.5,0.2],'WBC cytoplasm','#e0c8d8','blood_cyt');
  addLbl([1.1,-1.3,0.1],'Platelet','#f8d0d0','blood_plt');
  return g;
}

function buildStomata(){
  // Match images 1&2 — GREEN (chlorophyll, no stain), dense kidney pairs, dark oval pores
  const g=new THREE.Group();
  const GC_COL=0x5a8a2a; // guard cell green (chlorophyll)
  const EPI=0x78b040;    // epidermal cell green (lighter)
  const PORE=0x1a2a10;   // dark pore

  function guardPair(x,y,open=true){
    const pair=new THREE.Group();
    const sep=open?0.36:0.26;
    // Left guard cell
    const gcL=M(new THREE.SphereGeometry(0.58,14,10),GC_COL,0.92,35,'stom_guard');
    gcL.scale.set(0.52,1.35,0.4); gcL.position.set(-sep,0,0); gcL.rotation.z=0.48; pair.add(gcL);
    // Right guard cell
    const gcR=M(new THREE.SphereGeometry(0.58,14,10),GC_COL,0.92,35,'stom_guard');
    gcR.scale.set(0.52,1.35,0.4); gcR.position.set(sep,0,0); gcR.rotation.z=-0.48; pair.add(gcR);
    // Pore — dark oval between them
    const pore=M(new THREE.SphereGeometry(open?0.14:0.07,8,6),PORE,0.96,'','stom_pore');
    pore.scale.set(open?0.6:0.4,1.2,0.28); pore.position.set(0,0,0.12); pair.add(pore);
    // Chloroplasts inside guard cells — small bright green dots
    [[-sep-.06,0.22,0.14],[-sep+.06,-0.22,0.14],[sep+.06,0.22,0.14],[sep-.06,-0.22,0.14]].forEach(([cx,cy,cz])=>{
      const cp=M(new THREE.SphereGeometry(0.07,7,5),0x22aa44,0.95,'','stom_guard');
      cp.position.set(cx,cy,cz); pair.add(cp);
    });
    pair.position.set(x,y,0);
    return pair;
  }

  // 6 stomata pairs in a grid pattern — like the dense real image
  const grid=[[-0.85,-0.72],[0.85,-0.72],[-0.85,0.0],[0.85,0.0],[-0.85,0.72],[0.85,0.72]];
  const mainPair=guardPair(0,0,true);
  g.add(mainPair);
  g.userData.mainPair=mainPair;
  g.userData.stomataOpen=true;

  // Background epidermal cells (faint)
  grid.forEach(([x,y])=>{
    const ep=M(new THREE.SphereGeometry(0.52,10,8),EPI,0.32,15,'stom_epi');
    ep.scale.set(1.4,0.85,0.3); ep.position.set(x,y,-0.05); g.add(ep);
    // Small stomata pairs on background cells (decorative)
    const bp=guardPair(x,y,true);
    bp.scale.setScalar(0.6); g.add(bp);
  });

  addLbl([-0.95,0.85,0.2],'Guard Cell\n(+ chloroplasts)','#5a8a2a','stom_guard');
  addLbl([0,-0.85,0.15],'Stoma (pore)','#447722','stom_pore');
  addLbl([1.4,-0.72,0],'Epidermal cell\n(no chloroplasts)','#78b040','stom_epi');
  return g;
}

function buildYeast(){
  // Match images 9&10 — small pale ovals on hemocytometer grid, thin outline, pairs/chains
  const g=new THREE.Group();

  // Hemocytometer grid lines (faint background)
  const gridMat=new THREE.LineBasicMaterial({color:0x4488bb,opacity:0.35,transparent:true});
  for(let i=-3;i<=3;i++){
    const hG=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-2.8,i*.9,-.15),new THREE.Vector3(2.8,i*.9,-.15)]);
    g.add(new THREE.Line(hG,gridMat));
    const vG=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i*.9,-2.5,-.15),new THREE.Vector3(i*.9,2.5,-.15)]);
    g.add(new THREE.Line(vG,gridMat));
  }

  // Yeast cells — pale oval, thin outline, scattered + pairs
  const cellDefs=[
    {x:0,   y:0,   bud:true,  budDir:[0.38,0.1]},
    {x:0.9, y:0.6, bud:true,  budDir:[0.36,-0.1]},
    {x:-0.8,y:0.5, bud:false, budDir:null},
    {x:0.5, y:-0.7,bud:true,  budDir:[-0.1,0.38]},

    {x:-1.4,y:-0.2,bud:true,  budDir:[0.36,0.1]},
    {x:1.4, y:-0.3,bud:false, budDir:null},
    {x:0.2, y:1.3, bud:true,  budDir:[0.12,0.36]},
    {x:-0.2,y:-1.4,bud:false, budDir:null},
  ];

  cellDefs.forEach(({x,y,bud,budDir})=>{
    // Mother cell — pale oval, thin purple outline
    const mother=M(new THREE.SphereGeometry(0.28,12,10),0xd8e8f0,0.78,20,'yeast_mom');
    mother.scale.set(1.0,1.25,0.55); mother.position.set(x,y,0);
    g.add(mother);
    // Outline ring
    const out=new THREE.Mesh(new THREE.SphereGeometry(0.30,12,10),new THREE.MeshPhongMaterial({color:0x5588aa,wireframe:true,transparent:true,opacity:0.55}));
    out.scale.set(1.0,1.25,0.55); out.position.set(x,y,0); g.add(out);

    if(bud&&budDir){
      const [bx,by]=budDir;
      const budM=M(new THREE.SphereGeometry(0.18,10,8),0xb8d0e8,0.75,20,'yeast_bud');
      budM.scale.set(0.9,1.1,0.5); budM.position.set(x+bx,y+by,0);
      budM.userData.bud=true; g.add(budM);
      // Bud outline
      const bo=new THREE.Mesh(new THREE.SphereGeometry(0.19,10,8),new THREE.MeshPhongMaterial({color:0x4477aa,wireframe:true,transparent:true,opacity:0.5}));
      bo.scale.set(0.9,1.1,0.5); bo.position.set(x+bx,y+by,0); g.add(bo);
    }
  });
  // Store first bud for animation
  g.userData.budMesh=g.children.find(c=>c.userData&&c.userData.bud);

  addLbl([-0.7,0.9,0.2],'Mother cell','#d8e8f0','yeast_mom');
  addLbl([1.4,0.8,0.2],'Bud (daughter)','#b8d0e8','yeast_bud');
  return g;
}

function buildPollen(){
  const g=new THREE.Group();
  const ex=M(new THREE.SphereGeometry(0.88,20,16),0xffcc22,0.94,55,'poll_ex');
  g.add(ex);
  const in2=M(new THREE.SphereGeometry(0.82,16,12),0xffe880,0.25,'','poll_ex');
  g.add(in2);
  for(let i=0;i<24;i++){
    const theta=(i/24)*Math.PI*2;
    const phi=Math.acos(2*((i*0.618033)%1)-1);
    const sx=Math.sin(phi)*Math.cos(theta),sy=Math.cos(phi),sz=Math.sin(phi)*Math.sin(theta);
    const sp=M(new THREE.ConeGeometry(0.022,0.22,4),0xee9900,0.9,'','poll_sp');
    const r=0.88+0.11; sp.position.set(sx*r,sy*r,sz*r);
    sp.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(sx,sy,sz));
    g.add(sp);
    sp.userData.sid='poll_sp';
  }
  [0,2.094,4.188].forEach(a=>{
    const px=Math.sin(a)*.9,py=0,pz=Math.cos(a)*.9;
    const pt=M(new THREE.TorusGeometry(0.09,0.024,6,14),0xcc7700,0.85,'','poll_pore');
    pt.position.set(px,py,pz); pt.lookAt(0,0,0);
    pt.userData.sid='poll_pore'; g.add(pt);
  });
  addLbl([-1.5,0.8,0],'Exine\n(sporopollenin)','#ffcc22','poll_ex');
  addLbl([1.4,0.9,0],'Spine','#ee9900','poll_sp');
  addLbl([1.2,-0.8,0],'Germination\npore','#cc7700','poll_pore');
  return g;
}

function buildFungiHyphae(){
  const g=new THREE.Group();
  [[0,0,0,0],[0.3,0.2,0.55,0.4],[-0.28,0.15,-0.45,0.55]].forEach(([ox,oy,rz,rx])=>{
    const h=M(new THREE.CylinderGeometry(0.058,0.058,2.8,8),0x77bbaa,0.88,25,'fung_hyp');
    h.position.set(ox,oy,0); h.rotation.set(rx*0.3,0,rz); g.add(h);
  });
  const st1=M(new THREE.CylinderGeometry(0.038,0.038,0.9,8),0x66aa99,0.85);
  st1.position.set(0.05,1.08,0.06); g.add(st1);
  const sp1=M(new THREE.SphereGeometry(0.29,14,10),0x111111,0.95,'','fung_spor');
  sp1.position.set(0.05,1.55,0.06); sp1.userData.sid='fung_spor'; g.add(sp1);
  const st2=M(new THREE.CylinderGeometry(0.030,0.030,0.6,6),0x66aa99,0.75);
  st2.position.set(0.42,1.02,0); st2.rotation.z=0.25; g.add(st2);
  const sp2=M(new THREE.SphereGeometry(0.19,12,8),0x1a1a1a,0.92,'','fung_spor');
  sp2.position.set(0.5,1.32,0); sp2.userData.sid='fung_spor'; g.add(sp2);
  [[-0.28,-1.42,0],[-0.08,-1.42,0.08],[0.22,-1.42,-0.05],[0.42,-1.42,0.04]].forEach(([x,y,z])=>{
    const rh=M(new THREE.CylinderGeometry(0.02,0.013,0.35,5),0x55aa88,0.68,'','fung_rhiz');
    rh.position.set(x,y,z); rh.rotation.z=(Math.random()-.5)*.4;
    rh.userData.sid='fung_rhiz'; g.add(rh);
  });
  addLbl([-1.5,-0.2,0],'Hypha','#77bbaa','fung_hyp');
  addLbl([0.9,1.7,0],'Sporangium','#555555','fung_spor');
  addLbl([1.2,-1.5,0],'Rhizoid','#55aa88','fung_rhiz');
  return g;
}

const BUILDERS={
  ONION_CELL:buildOnionCell,CHEEK_CELL:buildCheekCell,BLOOD_SMEAR:buildBloodSmear,
  STOMATA:buildStomata,AMOEBA:buildAmoeba,YEAST:buildYeast,
  BACTERIA:buildBacteria,POLLEN:buildPollen,FUNGI_HYPHAE:buildFungiHyphae,
};

let curGroup=null,curSpec=null,switching=false;

function dispose(g){
  if(!g)return;
  g.traverse(o=>{
    if(o.geometry)o.geometry.dispose();
    if(o.material){if(o.material.map)o.material.map.dispose();o.material.dispose();}
  });
}

function loadNew(spec){
  // Reset XS mode on specimen switch
  if(_xsMode){
    _xsMode=false;_fadeDir=0;_fadeT=0;
    if(_xsGroup){_xsGroup.visible=false;_xsGroup=null;}
    var btn=document.getElementById('xs-btn');
    if(btn){btn.classList.remove('act');btn.textContent='✂ Cross-section';}
  }
  try {
    // Remove old
    if(curGroup){dispose(curGroup);scene.remove(curGroup);}
    clearLabels();
    // Build new
    const g=BUILDERS[spec]();
    scene.add(g);
    g.rotation.x=rotX; g.rotation.y=rotY;
    curGroup=g; curSpec=spec; switching=false;
  } catch(e) {
    console.error('loadNew error:', e);
    document.getElementById('bot-txt').textContent = 'Error: ' + e.message;
  }
}

function switchTo(spec){
  if(spec===curSpec&&!switching)return;
  showOverview(spec);
  loadNew(spec);
}

function showOverview(spec){
  const d=DATA[spec]; if(!d)return;
  let h=`<div class="p-name">${d.name}</div>
<div class="p-lat">${d.latin}</div>
<div class="p-ch">${d.ch}</div>
<div class="p-stain">${d.stain}</div>
<div class="divider"></div>
<div class="sec-lbl">Key structures — tap to learn</div>`;
  d.overview.forEach(o=>{
    h+=`<div class="ov-item"><div class="ov-dot" style="background:${o.col}"></div>
<div class="ov-body"><strong>${o.lbl}</strong>${o.txt}</div></div>`;
  });
  h+=`<div class="divider"></div>`;
  if(d.animNote) h+=`<div class="anim-note">${d.animNote}</div>`;
  document.getElementById('pc').innerHTML=h;
}

function openLesson(sid){
  var LX=LESSONS_XS&&LESSONS_XS[sid];
  var L=LX||LESSONS[sid]; if(!L)return;
  var grp=(_xsMode&&_xsGroup)?_xsGroup:curGroup;
  // Highlight mesh
  if(grp){
    grp.traverse(o=>{
      if(o.isMesh&&o.material){
        const e=o.userData.sid===sid?new THREE.Color(L.col):new THREE.Color(0);
        if(o.material.emissive!==undefined){
          o.material.emissive.set(e);
          o.material.emissiveIntensity=o.userData.sid===sid?0.35:0;
        }
      }
    });
  }
  document.getElementById('pc').innerHTML=`
<div class="back-btn" onclick="showOverview('${curSpec}');clearHighlight()">← back to overview</div>
<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
  <div style="width:11px;height:11px;border-radius:50%;background:${L.col};flex-shrink:0"></div>
  <div class="s-name" style="color:${L.col}">${L.name}</div>
</div>
<div class="s-fn">${L.fn}</div>
<div class="s-ncert">NCERT: ${L.ncert}</div>
<div class="s-fact">${L.fact}</div>`;
}

function clearHighlight(){
  if(!curGroup)return;
  curGroup.traverse(o=>{
    if(o.isMesh&&o.material&&o.material.emissive){
      o.material.emissive.set(new THREE.Color(0));
      o.material.emissiveIntensity=0;
    }
  });
}

// CLICK / RAYCAST
// ══════════════════════════════════════════════════════════════════════
const ray=new THREE.Raycaster();
const mouseV=new THREE.Vector2();
let didDrag=false;

function onPick(e){
  if(didDrag)return;
  const rect=cvEl.getBoundingClientRect();
  const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
  const cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
  mouseV.x=((cx-rect.left)/rect.width)*2-1;
  mouseV.y=-((cy-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouseV,camera);
  if(!curGroup)return;
  const hits=ray.intersectObjects(curGroup.children,true);
  if(hits.length>0){
    const sid=hits[0].object.userData.sid;
    if(sid){
      openLesson(sid);
      if(sid==='stom_pore'||sid==='stom_guard') toggleStomata();
    }
  }
}
cvEl.addEventListener('click',onPick);
cvEl.addEventListener('touchend',e=>{e.preventDefault();onPick(e);},{passive:false});

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
  switchTo(el.dataset.spec);
}

let rotX=0.1,rotY=0,drag=false,px=0,py=0,autoR=true,idleT=null;
function dStart(x,y){drag=true;didDrag=false;px=x;py=y;autoR=false;clearTimeout(idleT);}
function dMove(x,y){
  if(!drag)return;
  if(Math.abs(x-px)>2||Math.abs(y-py)>2)didDrag=true;
  rotY+=(x-px)*.009;rotX+=(y-py)*.009;
  rotX=Math.max(-1.1,Math.min(1.1,rotX));px=x;py=y;
  clearTimeout(idleT);idleT=setTimeout(()=>{autoR=true;},4000);
}
function dEnd(){drag=false;}
cvEl.addEventListener('mousedown',e=>dStart(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>dMove(e.clientX,e.clientY));
window.addEventListener('mouseup',dEnd);
cvEl.addEventListener('touchstart',e=>dStart(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
cvEl.addEventListener('touchmove',e=>{dMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
cvEl.addEventListener('touchend',dEnd);

let stomOpen=true,stomAngle=0.55,stomTarget=0.55;
function toggleStomata(){
  stomTarget=stomTarget>0.1?0:0.55;
  stomOpen=!stomOpen;
}

let time=0,yeastT=0,bacSep=0,bacDir=1;

// XS state — declared here so animate2 can access
var _xsCache={}, _xsMode=false, _xsGroup=null, _fadeDir=0, _fadeT=0;

function animate2(dt){
  if(!curGroup)return;
  time+=dt;

  // ── XS fade transition ──────────────────────────────────
  if(_fadeDir!==0){
    _fadeT+=dt*2.5;
    var ft=Math.min(_fadeT,1);
    if(_fadeDir===1){
      curGroup.traverse(function(o){if(o.isMesh&&o.material&&o.userData.baseOp!==undefined)o.material.opacity=o.userData.baseOp*(1-ft);});
      if(_xsGroup)_xsGroup.traverse(function(o){if(o.isMesh&&o.material&&o.userData.baseOp!==undefined){o.material.transparent=true;o.material.opacity=o.userData.baseOp*ft;}});
      if(ft>=1){_fadeDir=0;curGroup.visible=false;}
    } else {
      if(_xsGroup)_xsGroup.traverse(function(o){if(o.isMesh&&o.material&&o.userData.baseOp!==undefined)o.material.opacity=o.userData.baseOp*(1-ft);});
      curGroup.visible=true;
      curGroup.traverse(function(o){if(o.isMesh&&o.material&&o.userData.baseOp!==undefined)o.material.opacity=o.userData.baseOp*ft;});
      if(ft>=1){_fadeDir=0;if(_xsGroup){_xsGroup.visible=false;_xsGroup=null;}}
    }
  }

  // ── Sync XS group rotation with main group ───────────────
  if(_xsGroup&&_xsMode)_xsGroup.rotation.set(curGroup.rotation.x,curGroup.rotation.y,curGroup.rotation.z);

  // ── Scale bar ─────────────────────────────────────────────
  var sc=document.getElementById('sc-cv');
  if(sc&&curSpec&&SCALE_UM[curSpec]){
    var W2=wrap.clientWidth,H2=wrap.clientHeight;
    if(sc.width!==W2)sc.width=W2;if(sc.height!==H2)sc.height=H2;
    var ctx=sc.getContext('2d');ctx.clearRect(0,0,W2,H2);
    var um=SCALE_SHOW[curSpec],pxU=H2/(2*Math.tan(19*Math.PI/180)*6);
    var bw=Math.round((um/SCALE_UM[curSpec])*pxU),bx=14,by=H2-14,bh=4;
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(bx-4,by-bh-6,bw+8,bh+16,3);
    else ctx.rect(bx-4,by-bh-6,bw+8,bh+16);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.75)';ctx.fillRect(bx,by-bh,bw,bh);
    ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx,by-bh-3);ctx.lineTo(bx,by+1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+bw,by-bh-3);ctx.lineTo(bx+bw,by+1);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 8.5px system-ui,sans-serif';
    ctx.textAlign='center';ctx.fillText(um+' µm',bx+bw/2,by+9);
  }

  if(curSpec==='STOMATA'){
    stomAngle+=(stomTarget-stomAngle)*.08;
    if(curGroup.userData.mainPair){
      const p=curGroup.userData.mainPair;
      // Guard cells
      p.children.forEach((c,i)=>{
        if(c.userData&&c.userData.sid==='stom_guard'){
          if(i===0)c.rotation.z=-0.48*(stomAngle/.55);
          else if(i===1)c.rotation.z=0.48*(stomAngle/.55);
          if(i===0)c.position.x=-(stomAngle*0.65+0.15);
          else if(i===1)c.position.x=(stomAngle*0.65+0.15);
        }
      });
    }
  }

  if(curSpec==='AMOEBA'&&curGroup.userData.pseudos){
    curGroup.userData.pseudos.forEach((ps,i)=>{
      const s=1+0.18*Math.sin(time*1.3+i*2.0);
      ps.scale.set(1,s,1);
    });
    curGroup.traverse(o=>{
      if(o.userData.cv){const s=1+0.22*Math.sin(time*2.6);o.scale.setScalar(s);}
    });
  }

  if(curSpec==='YEAST'&&curGroup.userData.budMesh){
    yeastT+=dt;
    const cycle=yeastT%9;
    curGroup.userData.budMesh.scale.setScalar(0.85+0.25*(cycle/9));
  }

  if(curSpec==='BLOOD_SMEAR'){
    curGroup.traverse(o=>{
      if(o.userData&&o.userData.rbc){
        o.rotation.z+=0.003;
        o.position.y+=Math.sin(time*0.5+o.position.x)*0.0004;
      }
    });
  }

  if(curSpec==='BACTERIA'){
    bacSep+=dt*bacDir*0.016;
    if(bacSep>0.2||bacSep<0)bacDir*=-1;
    curGroup.traverse(o=>{
      if(o.userData&&o.userData.sid==='bact_pair'){
        if(o.position.x<0)o.position.x=-0.52*1.12-bacSep;
        else o.position.x=0.02*1.12+bacSep;
      }
    });
  }
}

// RENDER LOOP
// ══════════════════════════════════════════════════════════════════════
let lastT=0;
function render(now){
  // Start render loop
requestAnimationFrame(render);
  const dt=Math.min((now-lastT)*.001,.05);lastT=now;

  if(autoR&&curGroup)rotY+=.004;
  if(curGroup){curGroup.rotation.x=rotX;curGroup.rotation.y=rotY;}

  // No fade transition — instant switch for reliability

  animate2(dt);
  renderLabels();
  renderer.render(scene,camera);
}

    _es.onmessage=e=>{try{const d=JSON.parse(e.data);if(!d.specimen||!BUILDERS[d.specimen])return;const t=document.querySelector(`.tab[data-spec="${d.specimen}"]`);if(t)tabClick(t);if(d.confidence)document.getElementById('bot-conf').textContent=Math.round(d.confidence*100)+'%';}catch(err){}};
    _es.onerror=()=>{document.getElementById('dot').className='dot err';document.getElementById('bot-txt').textContent='reconnecting';_es.close();const fb=setInterval(async()=>{try{const r=await fetch(API+'/latest',{signal:AbortSignal.timeout(2000)});const d=await r.json();if(d.specimen&&BUILDERS[d.specimen]){const t=document.querySelector(`.tab[data-spec="${d.specimen}"]`);if(t)tabClick(t);}}catch(e){}},3000);setTimeout(()=>{clearInterval(fb);sse();},6000);};
  }

}

  addLbl([-1.4,0.8,0.1],'Exine (thick)\nsporopollenin','#ffcc22','xs_poll_exine');
  addLbl([1.4,0.6,0.1],'Intine (thin)\ncellulose + pectin','#ffe077','xs_poll_intine');
  addLbl([0.6,-0.8,0.1],'Generative cell\n→ 2 male gametes','#ee6600','xs_poll_gen');
  addLbl([-0.5,-0.5,0.1],'Vegetative cell\n(larger)','#dd9900','xs_poll_veg');
  return g;
}

function xsFungiHyphae(){
  var g=new THREE.Group();
  var hlen=2.6,hrad=0.12;
  var wallL=M(new THREE.CylinderGeometry(hrad+0.025,hrad+0.025,hlen,12),0x77bbaa,0.9,25,'xs_fung_wall');wallL.position.set(-0.2,0,0);g.add(wallL);
  var cytL=M(new THREE.CylinderGeometry(hrad,hrad,hlen*0.98,12),0x55aa88,0.65,10,'xs_fung_wall');cytL.position.set(-0.2,0,0);g.add(cytL);
  [[-0.2,-0.9,0.04],[-0.2,-0.45,0.03],[-0.2,0,0.04],[-0.2,0.45,0.03],[-0.2,0.9,0.04]].forEach(function(p){
    var nuc=M(new THREE.SphereGeometry(0.055,8,6),0x33aaaa,0.9,30,'xs_fung_nuclei');nuc.position.set(p[0],p[1],p[2]);g.add(nuc);
  });
  var twall=M(new THREE.CircleGeometry(hrad+0.025,16),0x77bbaa,0.9,20,'xs_fung_wall');twall.position.set(0.7,0,0);g.add(twall);
  var tcyt=M(new THREE.CircleGeometry(hrad,14),0x55aa88,0.65,10,'xs_fung_wall');tcyt.position.set(0.7,0,0.01);g.add(tcyt);
  var tnuc=M(new THREE.CircleGeometry(0.04,10),0x33aaaa,0.9,20,'xs_fung_nuclei');tnuc.position.set(0.74,0.03,0.02);g.add(tnuc);
  var tsR=new THREE.Mesh(new THREE.RingGeometry(hrad+0.018,hrad+0.032,16),new THREE.MeshBasicMaterial({color:0x14b8a6,transparent:true,opacity:0.4,side:THREE.DoubleSide}));tsR.position.set(0.7,0,0.03);g.add(tsR);
  var cut=new THREE.Mesh(new THREE.PlaneGeometry(2.6,0.01),new THREE.MeshBasicMaterial({color:0x14b8a6,transparent:true,opacity:0.5}));cut.rotation.z=Math.PI/2;cut.position.set(-0.2,0,0.04);g.add(cut);
  addLbl([-1.2,1.1,0.1],'Cell wall (chitin)\nnot cellulose!','#77bbaa','xs_fung_wall');
  addLbl([-1.2,-1.1,0.1],'Multiple nuclei\n(coenocytic — no septa)','#33aaaa','xs_fung_nuclei');
  addLbl([1.4,0.5,0.1],'T.S. view\n(tube cross-section)','#14b8a6','xs_fung_wall');
  return g;
}

var XS_BUILDERS={
  ONION_CELL:xsOnionCell,CHEEK_CELL:xsCheekCell,BLOOD_SMEAR:xsBloodSmear,
  STOMATA:xsStomata,AMOEBA:xsAmoeba,YEAST:xsYeast,
  BACTERIA:xsBacteria,POLLEN:xsPollen,FUNGI_HYPHAE:xsFungiHyphae,
};

// ── TOGGLE CROSS-SECTION ─────────────────────────────────────────────
function toggleXS(){
  _xsMode=!_xsMode;
  var btn=document.getElementById('xs-btn');
  btn.classList.toggle('act',_xsMode);
  btn.textContent=_xsMode?'✂ Full view':'✂ Cross-section';

  if(_xsMode){
    // Build XS group on demand
    if(!_xsCache[curSpec]){
      clearLabels();
      var xsg=XS_BUILDERS[curSpec]();
      xsg.rotation.set(curGroup.rotation.x,curGroup.rotation.y,curGroup.rotation.z);
      // Set initial opacity to 0 for fade-in
      xsg.traverse(function(o){if(o.isMesh&&o.material){o.material.transparent=true;o.material.opacity=0;}});
      xsg.visible=true;
      scene.add(xsg);
      _xsCache[curSpec]=xsg;
    } else {
      clearLabels();
      XS_BUILDERS[curSpec](); // rebuild labels
    }
    _xsGroup=_xsCache[curSpec];
    _xsGroup.visible=true;
    _xsGroup.rotation.set(curGroup.rotation.x,curGroup.rotation.y,curGroup.rotation.z);
    _fadeDir=1; _fadeT=0;
    // Add XS note to panel
    var pc=document.getElementById('pc');
    if(!document.getElementById('xs-note-el')){
      var note=document.createElement('div');
      note.className='xs-note';note.id='xs-note-el';
      note.textContent='✂ Cross-section — tap any structure to learn';
      pc.prepend(note);
    }
  } else {
    _fadeDir=-1; _fadeT=0;
    // Restore normal group visibility/opacity
    if(curGroup){
      curGroup.visible=true;
      curGroup.traverse(function(o){if(o.isMesh&&o.material&&o.userData.baseOp!==undefined){o.material.transparent=true;o.material.opacity=0;}});
    }
    var el=document.getElementById('xs-note-el');if(el)el.remove();
    clearLabels();
    if(curGroup){scene.remove(curGroup);dispose(curGroup);}
    var g=BUILDERS[curSpec]();
    g.rotation.set(rotX,rotY,0);
    scene.add(g);curGroup=g;curSpec=curSpec;
    // Now fade in from 0
    curGroup.traverse(function(o){if(o.isMesh&&o.material&&o.userData.baseOp!==undefined){o.material.transparent=true;o.material.opacity=0;}});
  }
}
