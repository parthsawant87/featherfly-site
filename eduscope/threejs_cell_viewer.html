<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EduScope 3D Cell Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0c10;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
#cv{position:absolute;inset:0;display:block;cursor:grab}
#cv:active{cursor:grabbing}

/* HUD TOP — specimen name + chapter */
#hud-top{position:absolute;top:14px;left:16px;right:64px;pointer-events:none}
#spec-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.01em;line-height:1.2;text-shadow:0 1px 8px rgba(0,0,0,.8)}
#spec-lat{font-size:10px;color:rgba(255,255,255,.42);margin-top:2px;font-style:italic}
#spec-ch{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;line-height:1.3}

/* CONNECTION DOT */
#dot-wrap{position:absolute;top:14px;right:14px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;transition:background .4s}
.dot.live{background:#22c55e;animation:bl 2s infinite}
.dot.err{background:#e03c2c}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}
#dot-txt{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.04em;text-transform:uppercase}

/* FUN FACT — centre overlay, fades in/out */
#fun-fact{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-200%);
  max-width:260px;text-align:center;
  font-size:11.5px;color:rgba(255,255,255,.78);line-height:1.6;
  background:rgba(0,0,0,.65);padding:9px 13px;border-radius:8px;
  backdrop-filter:blur(4px);pointer-events:none;
  opacity:0;transition:opacity .6s ease
}
#fun-fact.show{opacity:1}

/* STRUCTURE PILLS — bottom centre */
#structs{
  position:absolute;bottom:52px;left:0;right:0;
  display:flex;gap:5px;justify-content:center;flex-wrap:wrap;
  padding:0 12px;pointer-events:none
}
.spill{
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);
  border-radius:20px;padding:3px 9px;
  font-size:9.5px;color:rgba(255,255,255,.68);
  opacity:0;transform:translateY(6px);
  transition:opacity .3s ease,transform .3s ease
}
.spill.vis{opacity:1;transform:translateY(0)}

/* CONFIDENCE RING — bottom right */
#ring-wrap{position:absolute;bottom:14px;right:14px;width:52px;height:52px}
#ring-cv{width:52px;height:52px}
#ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}

/* MODE LABEL — bottom left */
#mode-lbl{position:absolute;bottom:14px;left:14px;font-size:9px;color:rgba(255,255,255,.22);letter-spacing:.06em;text-transform:uppercase}

/* HINT — shown briefly on first interaction */
#hint{position:absolute;top:50%;left:50%;transform:translate(-50%,60px);font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.06em;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity .5s}
#hint.show{opacity:1}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<!-- HUD -->
<div id="hud-top">
  <div id="spec-name">EduScope 3D Viewer</div>
  <div id="spec-lat"></div>
  <div id="spec-ch">Place a slide and start scanning</div>
</div>
<div id="dot-wrap">
  <div class="dot" id="dot"></div>
  <span id="dot-txt">waiting</span>
</div>
<div id="fun-fact"></div>
<div id="structs"></div>
<div id="ring-wrap">
  <canvas id="ring-cv" width="52" height="52"></canvas>
  <div id="ring-val">—</div>
</div>
<div id="mode-lbl">EduScope · WhiteMouse Pod</div>
<div id="hint">drag to rotate</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const IN_IFRAME = window.self !== window.top;
const API = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? 'http://localhost:8001'
  : 'https://eduscope-api.featherfly.in';

// ═══════════════════════════════════════════════════════════════════════════
// METADATA — matches eduscope_rca.py knowledge base
// ═══════════════════════════════════════════════════════════════════════════
const META = {
  ONION_CELL: {
    name:'Onion Epidermal Cell', lat:'Allium cepa', ch:'Class 9 · Fundamental Unit of Life',
    structs:['Cell wall','Large vacuole','Nucleus','Cell membrane'],
    fact:'The large central vacuole pushes the nucleus to the edge — no room for chloroplasts underground!',
    col:0xffe090, accent:'#f0a020'
  },
  CHEEK_CELL: {
    name:'Human Cheek Cell', lat:'Buccal epithelial', ch:'Class 9 · Fundamental Unit of Life',
    structs:['Cell membrane','Nucleus','Cytoplasm','No cell wall'],
    fact:'You shed and replace your entire mouth lining every 3–5 days. These cells are already on their way out!',
    col:0xc8e8ff, accent:'#60a0e0'
  },
  BLOOD_SMEAR: {
    name:'Human Blood Smear', lat:'Homo sapiens', ch:'Class 11 · Body Fluids & Circulation',
    structs:['RBC (no nucleus)','WBC (with nucleus)','Platelets'],
    fact:'Each RBC carries ~270 million haemoglobin molecules. It lost its nucleus to make room for more!',
    col:0xff6644, accent:'#e03c2c'
  },
  STOMATA: {
    name:'Stomata + Guard Cells', lat:'Leaf epidermis', ch:'Class 11 · Transport in Plants',
    structs:['Guard cells','Stoma (pore)','Chloroplasts','Epidermal cells'],
    fact:'Guard cells are the ONLY epidermal cells with chloroplasts — they need ATP to open the pore!',
    col:0xff8844, accent:'#22aa44'
  },
  AMOEBA: {
    name:'Amoeba proteus', lat:'Kingdom Protista', ch:'Class 8 · Microorganisms',
    structs:['Pseudopodia','Nucleus','Contractile vacuole','Food vacuole'],
    fact:'Amoeba has no fixed shape — it changes form every few seconds as pseudopodia extend and retract!',
    col:0x88bbcc, accent:'#14b8a6'
  },
  YEAST: {
    name:'Yeast (Saccharomyces)', lat:'Kingdom Fungi', ch:'Class 11 · Biological Classification',
    structs:['Mother cell','Bud (daughter)','Bud scar','Vacuole'],
    fact:'Yeast has been making bread rise for 7,000 years. You can watch budding happen in real time!',
    col:0xffe080, accent:'#f0a020'
  },
  BACTERIA: {
    name:'Bacteria (bacillus)', lat:'Kingdom Monera', ch:'Class 8 · Microorganisms',
    structs:['Cell wall','Nucleoid (no nucleus)','Cell membrane','Flagella'],
    fact:'One bacterium can become 2 billion in just 8 hours. Your gut has more bacteria than human cells!',
    col:0x4488cc, accent:'#2a7fff'
  },
  POLLEN: {
    name:'Pollen Grain', lat:'Male gametophyte', ch:'Class 12 · Sexual Reproduction in Plants',
    structs:['Exine (outer wall)','Spines (sporopollenin)','Germination pore','Vegetative cell'],
    fact:'Sporopollenin in the exine survives 10,000 years — scientists identify plants from Ice Age pollen!',
    col:0xffcc22, accent:'#f0a020'
  },
  FUNGI_HYPHAE: {
    name:'Fungal Hyphae (Rhizopus)', lat:'Kingdom Fungi', ch:'Class 10 · How Organisms Reproduce',
    structs:['Hyphae (filaments)','Sporangium','Sporangiophore','Rhizoids'],
    fact:"The world's largest living organism is a honey fungus in Oregon covering 8.9 km² — a single mycelium!",
    col:0x88ccaa, accent:'#14b8a6'
  }
};

// ═══════════════════════════════════════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════════════════
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('cv'), antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.setClearColor(0x0a0c10, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, W() / H(), 0.1, 100);
camera.position.set(0, 0, 5.2);

// Lights
const amb = new THREE.AmbientLight(0x334466, 1.0); scene.add(amb);
const sun = new THREE.DirectionalLight(0xffffff, 1.3);
sun.position.set(4, 6, 5); scene.add(sun);
const fill = new THREE.DirectionalLight(0x4466aa, 0.4);
fill.position.set(-4, -2, 3); scene.add(fill);
const pt = new THREE.PointLight(0x14b8a6, 0.8, 18);
pt.position.set(-3, 2, 3); scene.add(pt);

// Starfield background
(function() {
  const geo = new THREE.BufferGeometry();
  const pts = new Float32Array(300 * 3);
  for (let i = 0; i < 300; i++) {
    pts[i*3]   = (Math.random() - 0.5) * 40;
    pts[i*3+1] = (Math.random() - 0.5) * 40;
    pts[i*3+2] = (Math.random() - 0.5) * 40 - 10;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x445566, size: 0.06, transparent: true, opacity: 0.6 })));
})();

// ═══════════════════════════════════════════════════════════════════════════
// LABEL SPRITE HELPER
// ═══════════════════════════════════════════════════════════════════════════
function makeLabel(text, hexColor) {
  const W = 200, H = 36;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  // Rounded rect background
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  const r = 7;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(W-r, 0);
  ctx.quadraticCurveTo(W, 0, W, r);
  ctx.lineTo(W, H-r);
  ctx.quadraticCurveTo(W, H, W-r, H);
  ctx.lineTo(r, H);
  ctx.quadraticCurveTo(0, H, 0, H-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
  // Accent left bar
  if (hexColor) {
    ctx.fillStyle = hexColor;
    ctx.fillRect(0, 0, 3, H);
  }
  // Text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 13px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, W / 2, H / 2);
  const tex = new THREE.CanvasTexture(cv);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false, opacity: 0 });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(1.8, 0.32, 1);
  sp.userData.isLabel = true;
  return sp;
}

// ═══════════════════════════════════════════════════════════════════════════
// MESH HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function mat(color, opts = {}) {
  return new THREE.MeshPhongMaterial({
    color,
    transparent: true,
    opacity: opts.opacity !== undefined ? opts.opacity : 1.0,
    shininess: opts.shininess !== undefined ? opts.shininess : 60,
    side: opts.side || THREE.FrontSide,
    wireframe: opts.wire || false,
    depthWrite: opts.opacity !== undefined && opts.opacity < 1.0 ? false : true
  });
}

function mesh(geo, color, opts) {
  const m = new THREE.Mesh(geo, mat(color, opts));
  m.userData.baseOpacity = (opts && opts.opacity !== undefined) ? opts.opacity : 1.0;
  return m;
}

// ═══════════════════════════════════════════════════════════════════════════
// CELL MODEL BUILDERS — each returns THREE.Group
// ═══════════════════════════════════════════════════════════════════════════

function buildOnionCell() {
  const g = new THREE.Group();
  const accent = META.ONION_CELL.accent;
  // 6 rectangular cells in 2 columns × 3 rows — like peeled onion epidermis
  const positions = [[-0.55,-0.75,0],[0.55,-0.75,0],[-0.55,0,0],[0.55,0,0],[-0.55,0.75,0],[0.55,0.75,0]];
  positions.forEach(([x, y, z], i) => {
    // Cell body (slightly rounded box feel via scale)
    const cell = mesh(new THREE.BoxGeometry(1.0, 0.68, 0.1), 0xffe090, { opacity: 0.72 });
    cell.position.set(x, y, z);
    g.add(cell);
    // Cell wall edge (wireframe overlay)
    const wall = mesh(new THREE.BoxGeometry(1.02, 0.70, 0.12), 0xcc8820, { wire: true, opacity: 0.6 });
    wall.position.set(x, y, z);
    g.add(wall);
  });
  // Central vacuole in middle cell (index 2 = top-left of middle row → use centre)
  const vac = mesh(new THREE.SphereGeometry(0.32, 14, 10), 0xaad8f0, { opacity: 0.38, shininess: 90 });
  vac.position.set(-0.55, 0, 0.02);
  g.add(vac);
  // Nucleus in same cell — pushed to edge
  const nuc = mesh(new THREE.SphereGeometry(0.10, 10, 8), 0x775522, { opacity: 0.95 });
  nuc.position.set(-0.18, -0.18, 0.06);
  g.add(nuc);
  // Labels
  const lbVac = makeLabel('Large Central Vacuole', accent); lbVac.position.set(-0.55, 0.4, 0.2); g.add(lbVac);
  const lbNuc = makeLabel('Nucleus', accent); lbNuc.position.set(0.28, -0.18, 0.2); g.add(lbNuc);
  const lbWall = makeLabel('Cell Wall (cellulose)', accent); lbWall.position.set(1.3, 0.75, 0); g.add(lbWall);
  return g;
}

function buildCheekCell() {
  const g = new THREE.Group();
  const accent = META.CHEEK_CELL.accent;
  // 2 overlapping flat irregular cells (squashed spheres)
  const c1 = mesh(new THREE.SphereGeometry(1.05, 16, 12), 0xc8e8ff, { opacity: 0.72 });
  c1.scale.set(1.4, 0.75, 0.28); c1.position.set(0.1, 0.05, 0);
  g.add(c1);
  const c2 = mesh(new THREE.SphereGeometry(0.9, 14, 10), 0xb0d8f5, { opacity: 0.65 });
  c2.scale.set(1.3, 0.7, 0.24); c2.position.set(-0.8, 0.4, -0.05);
  g.add(c2);
  // Nucleus — dark blue, oval, central in main cell
  const nuc = mesh(new THREE.SphereGeometry(0.28, 14, 10), 0x1144dd, { opacity: 0.92 });
  nuc.scale.set(1.3, 1.0, 0.7); nuc.position.set(0.1, 0.05, 0.06);
  g.add(nuc);
  // Nuclear membrane outline
  const nm = mesh(new THREE.SphereGeometry(0.30, 14, 10), 0x2255ee, { wire: true, opacity: 0.4 });
  nm.scale.set(1.3, 1.0, 0.7); nm.position.set(0.1, 0.05, 0.06);
  g.add(nm);
  // Cell membrane outline
  const cm = mesh(new THREE.SphereGeometry(1.07, 16, 12), 0x5588bb, { wire: true, opacity: 0.25 });
  cm.scale.set(1.4, 0.75, 0.28); cm.position.set(0.1, 0.05, 0);
  g.add(cm);
  // Labels
  const lbNuc = makeLabel('Nucleus (DNA)', accent); lbNuc.position.set(0.8, 0.4, 0.3); g.add(lbNuc);
  const lbMem = makeLabel('Cell Membrane', accent); lbMem.position.set(-1.0, -0.6, 0.2); g.add(lbMem);
  const lbCyt = makeLabel('Cytoplasm', accent); lbCyt.position.set(0.6, -0.5, 0.3); g.add(lbCyt);
  return g;
}

function buildBloodSmear() {
  const g = new THREE.Group();
  const accent = META.BLOOD_SMEAR.accent;
  // Biconcave RBC — modify sphere vertices to create concavity
  function makeBiconcave(radius) {
    const geo = new THREE.SphereGeometry(radius, 16, 12);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      const r = Math.sqrt(x * x + z * z); // radial distance from Y axis
      // Flatten in Y and create central concavity
      const newY = y * 0.22 - (r < radius * 0.6 ? Math.sign(y) * 0.07 : 0);
      pos.setY(i, newY);
    }
    pos.needsUpdate = true;
    geo.computeVertexNormals();
    return geo;
  }
  // 5 RBCs at different positions
  const rbcPos = [[0,0,0],[1.15,0.25,0.05],[-1.0,-0.3,0.03],[0.3,1.0,-0.02],[-0.5,0.85,0.04]];
  rbcPos.forEach(([x,y,z]) => {
    const rbc = mesh(makeBiconcave(0.52), 0xff6644, { opacity: 0.92, shininess: 80 });
    rbc.position.set(x, y, z);
    rbc.rotation.z = (Math.random() - 0.5) * 0.8;
    g.add(rbc);
  });
  // 1 WBC — larger, with visible nucleus
  const wbc = mesh(new THREE.SphereGeometry(0.68, 14, 12), 0xddbbee, { opacity: 0.88 });
  wbc.position.set(-0.15, 0.1, 0.12);
  g.add(wbc);
  // WBC nucleus — lobed (two overlapping spheres)
  const wn1 = mesh(new THREE.SphereGeometry(0.28, 10, 8), 0x7733bb, { opacity: 0.9 });
  wn1.position.set(-0.22, 0.08, 0.12);
  g.add(wn1);
  const wn2 = mesh(new THREE.SphereGeometry(0.22, 10, 8), 0x7733bb, { opacity: 0.9 });
  wn2.position.set(0.08, 0.18, 0.12);
  g.add(wn2);
  // 3 platelets — tiny irregular fragments
  [[0.7,-0.7,0.08],[1.4,-0.4,0.06],[-1.2,0.6,0.05]].forEach(([x,y,z]) => {
    const plt = mesh(new THREE.SphereGeometry(0.12, 8, 6), 0xffaaaa, { opacity: 0.8 });
    plt.scale.set(1.4, 0.8, 0.5);
    plt.position.set(x, y, z);
    g.add(plt);
  });
  // Labels
  const lbRBC = makeLabel('RBC — biconcave, no nucleus', accent); lbRBC.position.set(1.4, -0.8, 0.3); g.add(lbRBC);
  const lbWBC = makeLabel('WBC (has nucleus)', '#aa88ff'); lbWBC.position.set(-1.3, 0.6, 0.3); g.add(lbWBC);
  const lbPlt = makeLabel('Platelet (tiny fragment)', '#ff8888'); lbPlt.position.set(1.0, -1.2, 0.2); g.add(lbPlt);
  return g;
}

function buildStomata() {
  const g = new THREE.Group();
  const accent = META.STOMATA.accent;
  // 2 kidney-shaped guard cells — made from squashed + rotated spheres
  const gcLeft = mesh(new THREE.SphereGeometry(0.55, 14, 10), 0xff8844, { opacity: 0.92 });
  gcLeft.scale.set(0.55, 1.3, 0.38);
  gcLeft.position.set(-0.38, 0, 0);
  gcLeft.rotation.z = 0.45;
  g.add(gcLeft);
  const gcRight = mesh(new THREE.SphereGeometry(0.55, 14, 10), 0xff8844, { opacity: 0.92 });
  gcRight.scale.set(0.55, 1.3, 0.38);
  gcRight.position.set(0.38, 0, 0);
  gcRight.rotation.z = -0.45;
  g.add(gcRight);
  // Pore — dark oval between guard cells
  const pore = mesh(new THREE.SphereGeometry(0.15, 10, 8), 0x0a0a14, { opacity: 0.9 });
  pore.scale.set(0.6, 1.2, 0.3);
  pore.position.set(0, 0, 0.08);
  g.add(pore);
  // Chloroplasts on guard cells — small green spheres
  [[-0.52,0.3,0.14],[-0.42,-0.3,0.14],[-0.3,0.0,0.15],[0.52,0.3,0.14],[0.42,-0.3,0.14],[0.3,0.0,0.15]].forEach(([x,y,z]) => {
    const cp = mesh(new THREE.SphereGeometry(0.09, 8, 6), 0x22aa44, { opacity: 0.95 });
    cp.position.set(x, y, z);
    g.add(cp);
  });
  // Surrounding epidermal cells (faint)
  [[-1.3,0,0],[1.3,0,0],[0,1.2,0],[0,-1.2,0]].forEach(([x,y,z]) => {
    const ec = mesh(new THREE.SphereGeometry(0.5, 10, 8), 0xddcc88, { opacity: 0.18 });
    ec.scale.set(1.4, 0.9, 0.3);
    ec.position.set(x, y, z);
    g.add(ec);
  });
  // Labels
  const lbGC = makeLabel('Guard Cell', accent); lbGC.position.set(-1.4, 0.6, 0.3); g.add(lbGC);
  const lbPore = makeLabel('Stoma (pore)', '#888888'); lbPore.position.set(0, -0.8, 0.3); g.add(lbPore);
  const lbCP = makeLabel('Chloroplast', '#22cc55'); lbCP.position.set(1.2, 0.7, 0.3); g.add(lbCP);
  return g;
}

function buildAmoeba() {
  const g = new THREE.Group();
  const accent = META.AMOEBA.accent;
  // Irregular body — squashed sphere with slight distortion
  const body = mesh(new THREE.SphereGeometry(1.0, 16, 12), 0x88bbcc, { opacity: 0.52, shininess: 40 });
  body.scale.set(1.25, 0.88, 0.5);
  g.add(body);
  // Body outline
  const bodyOut = mesh(new THREE.SphereGeometry(1.02, 16, 12), 0x5599bb, { wire: true, opacity: 0.25 });
  bodyOut.scale.set(1.25, 0.88, 0.5);
  g.add(bodyOut);
  // Pseudopodia — 3 finger-like extensions (tapered cylinders)
  const pseudoDefs = [
    { pos: [1.35, 0.1, 0], rot: [0, 0, -Math.PI/2], len: 0.7 },
    { pos: [0.6, 0.95, 0], rot: [0, 0, -Math.PI/4], len: 0.6 },
    { pos: [-1.1, 0.4, 0], rot: [0, 0, Math.PI * 0.55], len: 0.65 },
  ];
  pseudoDefs.forEach(({ pos, rot, len }) => {
    const ps = mesh(new THREE.CylinderGeometry(0.08, 0.22, len, 8), 0x88bbcc, { opacity: 0.60 });
    ps.position.set(...pos);
    ps.rotation.set(...rot);
    g.add(ps);
  });
  // Nucleus
  const nuc = mesh(new THREE.SphereGeometry(0.26, 12, 10), 0x2255aa, { opacity: 0.90 });
  nuc.position.set(0.1, 0.05, 0.1);
  g.add(nuc);
  const nucOut = mesh(new THREE.SphereGeometry(0.28, 12, 10), 0x3366bb, { wire: true, opacity: 0.40 });
  nucOut.position.set(0.1, 0.05, 0.1);
  g.add(nucOut);
  // Contractile vacuole — pulsing (animated via userData)
  const cv = mesh(new THREE.SphereGeometry(0.13, 10, 8), 0xaaddff, { opacity: 0.55, shininess: 100 });
  cv.position.set(-0.5, -0.25, 0.1);
  cv.userData.contractile = true;
  g.add(cv);
  // Food vacuole
  const fv = mesh(new THREE.SphereGeometry(0.10, 8, 6), 0x558844, { opacity: 0.65 });
  fv.position.set(0.35, -0.3, 0.1);
  g.add(fv);
  // Labels
  const lbPseudo = makeLabel('Pseudopodium', accent); lbPseudo.position.set(1.6, 0.6, 0.3); g.add(lbPseudo);
  const lbNuc = makeLabel('Nucleus', '#4488cc'); lbNuc.position.set(0.7, 0.5, 0.3); g.add(lbNuc);
  const lbCV = makeLabel('Contractile Vacuole', '#88ccff'); lbCV.position.set(-1.4, -0.6, 0.3); g.add(lbCV);
  return g;
}

function buildYeast() {
  const g = new THREE.Group();
  const accent = META.YEAST.accent;
  // Mother cell
  const mother = mesh(new THREE.SphereGeometry(0.72, 16, 12), 0xffe080, { opacity: 0.94 });
  g.add(mother);
  // Large bud (daughter cell forming, still attached)
  const bud = mesh(new THREE.SphereGeometry(0.46, 14, 10), 0xffd040, { opacity: 0.92 });
  bud.position.set(0.9, 0.36, 0);
  g.add(bud);
  // Small forming bud (early stage)
  const bud2 = mesh(new THREE.SphereGeometry(0.22, 10, 8), 0xffc820, { opacity: 0.88 });
  bud2.position.set(-0.58, -0.64, 0);
  g.add(bud2);
  // Bud scar — thin torus at junction of mother and large bud
  const scar = mesh(new THREE.TorusGeometry(0.16, 0.024, 8, 20), 0xcc9900, { opacity: 0.75 });
  scar.position.set(0.56, 0.22, 0);
  scar.rotation.y = Math.PI / 2;
  g.add(scar);
  // Vacuole inside mother
  const vac = mesh(new THREE.SphereGeometry(0.28, 10, 8), 0xfffae0, { opacity: 0.30, shininess: 100 });
  g.add(vac);
  // Nucleus in mother
  const nuc = mesh(new THREE.SphereGeometry(0.18, 10, 8), 0xdd8800, { opacity: 0.80 });
  nuc.position.set(-0.18, 0.18, 0.22);
  g.add(nuc);
  // Labels
  const lbM = makeLabel('Mother cell', accent); lbM.position.set(-1.2, 0.7, 0.3); g.add(lbM);
  const lbB = makeLabel('Bud (daughter cell)', '#ffd040'); lbB.position.set(1.5, 0.8, 0.3); g.add(lbB);
  const lbS = makeLabel('Bud scar', '#cc9900'); lbS.position.set(0.3, -0.7, 0.3); g.add(lbS);
  const lbB2 = makeLabel('New bud forming', '#ffc820'); lbB2.position.set(-1.3, -1.0, 0.3); g.add(lbB2);
  return g;
}

function buildBacteria() {
  const g = new THREE.Group();
  const accent = META.BACTERIA.accent;
  // Bacteria are much smaller — 12 rods scattered (bacillus form)
  // Positions: some in pairs (binary fission), some solo
  const defs = [
    [0, 0, 0, 0],       [0.4, 0.08, 0, 0.2],   // pair 1 (dividing)
    [-0.5, 0.5, 0, 0.8],[0.0, 0.55, 0, 1.0],    // pair 2
    [-0.8,-0.3, 0,-0.3],[0.8, -0.5, 0, 0.5],    // solo
    [0.3, -0.6, 0, 1.4],[-0.6,-0.7, 0,-0.6],   // solo
    [0.9,  0.3, 0, 2.0],[-0.9, 0.4, 0, 1.5],   // solo
    [0.2,  0.8, 0,-1.0],[-0.2,-0.9, 0, 0.7],   // solo
  ];
  defs.forEach(([x, y, z, rz]) => {
    const rod = mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.38, 8), 0x4488cc, { opacity: 0.92 });
    rod.position.set(x * 1.1, y * 1.1, z);
    rod.rotation.z = rz;
    // Hemispherical caps via sphere scaling
    rod.scale.set(1, 1, 1);
    g.add(rod);
    // Caps
    [0.19, -0.19].forEach(dy => {
      const cap = mesh(new THREE.SphereGeometry(0.055, 8, 6), 0x4488cc, { opacity: 0.92 });
      cap.position.set(x * 1.1, y * 1.1 + Math.cos(rz) * dy, z + Math.sin(rz) * dy * 0.8);
      // Approximate cap position
      cap.position.set(
        x * 1.1 - Math.sin(rz) * dy,
        y * 1.1 + Math.cos(rz) * dy,
        z
      );
      g.add(cap);
    });
  });
  // Labels
  const lbRod = makeLabel('Bacillus (rod shape)', accent); lbRod.position.set(1.4, 0.7, 0.3); g.add(lbRod);
  const lbDiv = makeLabel('Binary fission pair', '#6699ff'); lbDiv.position.set(0.9, -0.3, 0.3); g.add(lbDiv);
  const lbWall = makeLabel('No true nucleus', '#88aacc'); lbWall.position.set(-1.4, -0.7, 0.3); g.add(lbWall);
  return g;
}

function buildPollen() {
  const g = new THREE.Group();
  const accent = META.POLLEN.accent;
  // Main body — exine
  const exine = mesh(new THREE.SphereGeometry(0.88, 20, 16), 0xffcc22, { opacity: 0.94, shininess: 50 });
  g.add(exine);
  // Inner intine layer (slightly smaller, lighter)
  const intine = mesh(new THREE.SphereGeometry(0.82, 16, 12), 0xffe880, { opacity: 0.30 });
  g.add(intine);
  // Spines — 20 cylinders radiating from surface
  const N = 20;
  for (let i = 0; i < N; i++) {
    const theta = (i / N) * Math.PI * 2;
    const phi = Math.acos(2 * ((i * 0.618033) % 1) - 1); // golden angle distribution
    const sx = Math.sin(phi) * Math.cos(theta);
    const sy = Math.cos(phi);
    const sz = Math.sin(phi) * Math.sin(theta);
    const spine = mesh(new THREE.CylinderGeometry(0.018, 0.008, 0.24, 4), 0xee9900, { opacity: 0.90 });
    const r = 0.88 + 0.12; // base + half length
    spine.position.set(sx * r, sy * r, sz * r);
    // Point away from centre
    const dir = new THREE.Vector3(sx, sy, sz);
    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
    spine.quaternion.copy(quat);
    g.add(spine);
  }
  // 3 germination pores — darker patches + torus rings
  [0, 2.094, 4.188].forEach((angle) => {
    const px = Math.sin(angle) * 0.9;
    const py = 0;
    const pz = Math.cos(angle) * 0.9;
    const pore = mesh(new THREE.TorusGeometry(0.10, 0.025, 6, 14), 0xcc7700, { opacity: 0.80 });
    pore.position.set(px, py, pz);
    pore.lookAt(0, 0, 0);
    g.add(pore);
    const poreIn = mesh(new THREE.CircleGeometry(0.08, 12), 0x885500, { opacity: 0.70 });
    poreIn.position.set(px * 0.93, py, pz * 0.93);
    poreIn.lookAt(0, 0, 0);
    g.add(poreIn);
  });
  // Labels
  const lbEx = makeLabel('Exine (sporopollenin)', accent); lbEx.position.set(-1.5, 0.8, 0.3); g.add(lbEx);
  const lbSp = makeLabel('Spine', '#ee9900'); lbSp.position.set(1.4, 0.9, 0.3); g.add(lbSp);
  const lbPore = makeLabel('Germination pore', '#cc7700'); lbPore.position.set(1.2, -0.7, 0.3); g.add(lbPore);
  return g;
}

function buildFungiHyphae() {
  const g = new THREE.Group();
  const accent = META.FUNGI_HYPHAE.accent;
  // 3 main hyphae at different angles
  const hyphaDefs = [
    { rot: [0, 0, 0],       pos: [0, 0, 0] },
    { rot: [0, 0, 0.55],    pos: [0.3, 0.2, 0] },
    { rot: [0, 0, -0.45],   pos: [-0.3, 0.15, 0] },
  ];
  hyphaDefs.forEach(({ rot, pos }) => {
    const h = mesh(new THREE.CylinderGeometry(0.055, 0.055, 2.8, 8), 0x88ccaa, { opacity: 0.88 });
    h.position.set(...pos);
    h.rotation.set(...rot);
    g.add(h);
  });
  // Sporangiophore stalk (upright, narrower)
  const stalk = mesh(new THREE.CylinderGeometry(0.038, 0.038, 0.9, 8), 0x77bb99, { opacity: 0.85 });
  stalk.position.set(0.05, 1.05, 0.05);
  g.add(stalk);
  // Sporangium at tip — dark round spore case
  const spor = mesh(new THREE.SphereGeometry(0.30, 14, 10), 0x1a1a1a, { opacity: 0.95 });
  spor.position.set(0.05, 1.52, 0.05);
  g.add(spor);
  // Second smaller sporangium
  const spor2 = mesh(new THREE.SphereGeometry(0.20, 12, 8), 0x222222, { opacity: 0.90 });
  spor2.position.set(0.45, 1.3, 0);
  const stalk2 = mesh(new THREE.CylinderGeometry(0.030, 0.030, 0.6, 6), 0x77bb99, { opacity: 0.75 });
  stalk2.position.set(0.38, 1.0, 0); stalk2.rotation.z = 0.25;
  g.add(stalk2); g.add(spor2);
  // Rhizoids at base — thin short cylinders downward
  [[-0.3,-1.4,0],[-0.1,-1.4,0.08],[0.2,-1.4,-0.05],[0.4,-1.4,0.04]].forEach(([x,y,z]) => {
    const rh = mesh(new THREE.CylinderGeometry(0.022, 0.015, 0.35, 6), 0x66aa88, { opacity: 0.65 });
    rh.position.set(x, y, z);
    rh.rotation.z = (Math.random() - 0.5) * 0.4;
    g.add(rh);
  });
  // Labels
  const lbH = makeLabel('Hypha (coenocytic)', accent); lbH.position.set(-1.5, -0.2, 0.3); g.add(lbH);
  const lbS = makeLabel('Sporangium', '#333333'); lbS.position.set(0.9, 1.7, 0.3); g.add(lbS);
  const lbR = makeLabel('Rhizoids', '#88aa88'); lbR.position.set(1.2, -1.5, 0.3); g.add(lbR);
  return g;
}

const BUILDERS = {
  ONION_CELL: buildOnionCell,
  CHEEK_CELL: buildCheekCell,
  BLOOD_SMEAR: buildBloodSmear,
  STOMATA: buildStomata,
  AMOEBA: buildAmoeba,
  YEAST: buildYeast,
  BACTERIA: buildBacteria,
  POLLEN: buildPollen,
  FUNGI_HYPHAE: buildFungiHyphae,
};

// ═══════════════════════════════════════════════════════════════════════════
// TRANSITION STATE
// ═══════════════════════════════════════════════════════════════════════════
let currentGroup = null;
let currentSpecimen = null;
let currentConf = 0.9;

// transition: { phase:'out'|'in', elapsed:ms, group:Group, targetSpec, targetConf }
let trans = null;
const TRANS_OUT = 200;  // ms for fade out
const TRANS_IN  = 420;  // ms for fade in

function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeIn(t)  { return t * t; }
function spring(t)  { // simple spring overshoot
  return 1 + Math.sin(t * Math.PI * 2.5) * 0.08 * (1 - t);
}

function setGroupVisibility(group, opacity, scale) {
  if (!group) return;
  group.scale.setScalar(scale);
  group.traverse(obj => {
    if ((obj.isMesh || obj.isSprite) && obj.material) {
      const base = obj.userData.baseOpacity !== undefined ? obj.userData.baseOpacity : 1.0;
      obj.material.opacity = base * opacity;
    }
  });
}

function disposeGroup(group) {
  if (!group) return;
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (obj.material.map) obj.material.map.dispose();
      obj.material.dispose();
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// SWITCH SPECIMEN — entry point for all input sources
// ═══════════════════════════════════════════════════════════════════════════
function switchToSpecimen(spec, conf) {
  if (!BUILDERS[spec]) return;
  if (spec === currentSpecimen && !trans) return; // no change

  currentConf = conf || 0.9;
  const targetSpec = spec;
  const targetConf = currentConf;

  // If already transitioning, kill old
  if (trans && trans.group && trans.group !== currentGroup) {
    scene.remove(trans.group);
    disposeGroup(trans.group);
  }

  if (!currentGroup) {
    // First specimen — go straight to in
    const newGroup = BUILDERS[targetSpec]();
    scene.add(newGroup);
    setGroupVisibility(newGroup, 0, 0.01);
    currentGroup = newGroup;
    currentSpecimen = targetSpec;
    trans = { phase: 'in', elapsed: 0, group: newGroup, conf: targetConf };
  } else {
    trans = { phase: 'out', elapsed: 0, group: currentGroup, targetSpec, targetConf };
  }

  // Show fun fact
  showFunFact(META[spec].fact);
  updateHUD(spec, conf);
}

// ═══════════════════════════════════════════════════════════════════════════
// HUD UPDATERS
// ═══════════════════════════════════════════════════════════════════════════
function updateHUD(spec, conf) {
  const m = META[spec];
  if (!m) return;
  document.getElementById('spec-name').textContent = m.name;
  document.getElementById('spec-lat').textContent = m.lat;
  document.getElementById('spec-ch').textContent = m.ch;

  // Structure pills — fade in staggered
  const sc = document.getElementById('structs');
  sc.innerHTML = m.structs.map((s, i) =>
    `<span class="spill" style="transition-delay:${i*60}ms">${s}</span>`
  ).join('');
  requestAnimationFrame(() => {
    sc.querySelectorAll('.spill').forEach(p => p.classList.add('vis'));
  });

  // Confidence ring
  updateRing(conf, m.accent);
}

function showFunFact(text) {
  const el = document.getElementById('fun-fact');
  el.classList.remove('show');
  void el.offsetWidth; // reflow
  el.textContent = text;
  requestAnimationFrame(() => {
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4500);
  });
}

function updateRing(conf, accent) {
  const cv = document.getElementById('ring-cv');
  const ctx = cv.getContext('2d');
  const cx = 26, cy = 26, r = 21;
  ctx.clearRect(0, 0, 52, 52);
  // Track
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 3; ctx.stroke();
  // Fill
  if (conf > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + conf * Math.PI * 2);
    ctx.strokeStyle = conf > 0.8 ? accent : conf > 0.55 ? '#f0a020' : '#e03c2c';
    ctx.lineWidth = 3; ctx.stroke();
  }
  document.getElementById('ring-val').textContent = Math.round(conf * 100) + '%';
}

// ═══════════════════════════════════════════════════════════════════════════
// ORBIT CONTROLS
// ═══════════════════════════════════════════════════════════════════════════
let rotX = 0.15, rotY = 0;
let isDragging = false;
let prevX = 0, prevY = 0;
let autoRot = true;
let idleTimer = null;

function onDragStart(x, y) {
  isDragging = true;
  prevX = x; prevY = y;
  autoRot = false;
  clearTimeout(idleTimer);
  // Show hint once
  document.getElementById('hint').classList.remove('show');
}
function onDragMove(x, y) {
  if (!isDragging) return;
  rotY += (x - prevX) * 0.008;
  rotX += (y - prevY) * 0.008;
  rotX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, rotX));
  prevX = x; prevY = y;
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => { autoRot = true; }, 3000);
}
function onDragEnd() { isDragging = false; }

const cv = document.getElementById('cv');
cv.addEventListener('mousedown', e => onDragStart(e.clientX, e.clientY));
window.addEventListener('mousemove', e => onDragMove(e.clientX, e.clientY));
window.addEventListener('mouseup', onDragEnd);
cv.addEventListener('touchstart', e => { onDragStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
cv.addEventListener('touchmove', e => { onDragMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
cv.addEventListener('touchend', onDragEnd);

// Show drag hint after 2s if no specimen yet
setTimeout(() => {
  if (!currentSpecimen) document.getElementById('hint').classList.add('show');
}, 2000);

// ═══════════════════════════════════════════════════════════════════════════
// LABEL FADE IN (after transition completes)
// ═══════════════════════════════════════════════════════════════════════════
function fadeInLabels(group, confOpacity) {
  if (!group) return;
  let delay = 0;
  group.traverse(obj => {
    if (obj.isSprite && obj.userData.isLabel) {
      const d = delay;
      delay += 80;
      setTimeout(() => {
        if (obj.material) {
          let t = 0;
          const iv = setInterval(() => {
            t += 0.05;
            if (obj.material) obj.material.opacity = Math.min(1, t) * 0.88 * confOpacity;
            if (t >= 1) clearInterval(iv);
          }, 16);
        }
      }, d);
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════════════
let lastT = 0;
let time = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min(now - lastT, 50); // cap at 50ms
  lastT = now;
  time += dt * 0.001;

  // Auto-rotate
  if (autoRot && currentGroup) {
    rotY += 0.004;
  }

  // Apply rotation to current group
  if (currentGroup) {
    currentGroup.rotation.x = rotX;
    currentGroup.rotation.y = rotY;
  }

  // Animate contractile vacuole in Amoeba
  if (currentGroup && currentSpecimen === 'AMOEBA') {
    currentGroup.traverse(obj => {
      if (obj.userData.contractile && obj.isMesh) {
        const s = 1 + 0.18 * Math.sin(time * 3.0);
        obj.scale.setScalar(s);
      }
    });
  }

  // Subtle point light orbit
  pt.position.x = Math.sin(time * 0.4) * 3.5;
  pt.position.y = Math.cos(time * 0.3) * 2.0;

  // Transition processing
  if (trans) {
    trans.elapsed += dt;

    if (trans.phase === 'out') {
      const t = Math.min(1, trans.elapsed / TRANS_OUT);
      const opacity = 1 - easeOut(t);
      const scale = 1 - easeOut(t) * 0.75;
      setGroupVisibility(trans.group, opacity, scale);

      if (t >= 1) {
        // Remove old group
        scene.remove(trans.group);
        disposeGroup(trans.group);
        currentGroup = null;

        // Build and add new group
        const newGroup = BUILDERS[trans.targetSpec]();
        scene.add(newGroup);
        newGroup.rotation.x = rotX;
        newGroup.rotation.y = rotY;
        setGroupVisibility(newGroup, 0, 0.08);
        currentGroup = newGroup;
        currentSpecimen = trans.targetSpec;
        const targetConf = trans.targetConf;
        trans = { phase: 'in', elapsed: 0, group: newGroup, conf: targetConf };
      }

    } else if (trans.phase === 'in') {
      const t = Math.min(1, trans.elapsed / TRANS_IN);
      const confOpacity = 0.4 + (trans.conf || 0.9) * 0.6;
      const opacity = easeOut(t) * confOpacity;
      const scale = spring(t);
      // Apply to non-label meshes
      trans.group.traverse(obj => {
        if ((obj.isMesh) && obj.material) {
          const base = obj.userData.baseOpacity !== undefined ? obj.userData.baseOpacity : 1.0;
          obj.material.opacity = base * opacity;
        }
      });
      trans.group.scale.setScalar(scale);

      if (t >= 1) {
        // Fade in labels
        fadeInLabels(trans.group, confOpacity);
        trans = null;
      }
    }
  }

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════════════════
// INPUT SOURCES
// ═══════════════════════════════════════════════════════════════════════════

// 1. postMessage from parent iframe
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'FEATHERFLY_SPECIMEN' && BUILDERS[e.data.specimen]) {
    const dot = document.getElementById('dot');
    dot.classList.add('live'); dot.classList.remove('err');
    document.getElementById('dot-txt').textContent = 'live';
    switchToSpecimen(e.data.specimen, e.data.confidence || 0.9);
  }
});

// 2. SSE — only when NOT in iframe
let _es = null;
function connectSSE() {
  if (IN_IFRAME) return; // parent handles SSE and sends postMessage
  _es = new EventSource(API + '/stream');
  _es.onopen = () => {
    const dot = document.getElementById('dot');
    dot.classList.add('live'); dot.classList.remove('err');
    document.getElementById('dot-txt').textContent = 'live';
  };
  _es.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (!d.specimen || !BUILDERS[d.specimen]) return;
      switchToSpecimen(d.specimen, d.confidence || 0.9);
    } catch(err) {}
  };
  _es.onerror = () => {
    const dot = document.getElementById('dot');
    dot.classList.remove('live'); dot.classList.add('err');
    document.getElementById('dot-txt').textContent = 'reconnecting';
    _es.close();
    // Fallback poll + reconnect
    const fb = setInterval(async () => {
      try {
        const r = await fetch(API + '/latest', { signal: AbortSignal.timeout(2000) });
        const d = await r.json();
        if (d.specimen && BUILDERS[d.specimen]) {
          dot.classList.add('live'); dot.classList.remove('err');
          document.getElementById('dot-txt').textContent = 'polling';
          switchToSpecimen(d.specimen, d.confidence || 0.9);
        }
      } catch(err) {}
    }, 3000);
    setTimeout(() => { clearInterval(fb); connectSSE(); }, 6000);
  };
}

// 3. URL param — for standalone testing
const urlSpec = new URLSearchParams(location.search).get('specimen');
if (urlSpec && BUILDERS[urlSpec]) {
  // Small delay so Three.js is ready
  setTimeout(() => switchToSpecimen(urlSpec, 0.95), 100);
} else if (!IN_IFRAME) {
  // Show a default specimen when opened standalone
  setTimeout(() => switchToSpecimen('ONION_CELL', 0.92), 100);
}

// Start SSE if standalone
connectSSE();

// If in iframe but no postMessage after 3s, show ONION as placeholder
if (IN_IFRAME) {
  setTimeout(() => {
    if (!currentSpecimen) switchToSpecimen('ONION_CELL', 0.88);
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

// ═══════════════════════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════════════════════
requestAnimationFrame(animate);
</script>
